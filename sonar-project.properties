sonar.projectKey=ebelo_qfit
sonar.organization=ebelo
sonar.projectName=qfit

sonar.sources=.
sonar.tests=tests
sonar.exclusions=dist/**,.git/**,.github/**,__pycache__/**,*.pyc,tests/**
