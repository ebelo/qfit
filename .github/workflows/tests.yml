name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: QFIT
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: QFIT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
