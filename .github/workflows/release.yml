name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test and packaging dependencies
        run: python -m pip install --upgrade pyyaml pypdf

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Build QGIS-major plugin ZIPs
        run: |
          python scripts/package_plugin.py --qgis-major 3
          python scripts/package_plugin.py --qgis-major 4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/*-qgis*.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes
